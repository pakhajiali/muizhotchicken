    <style>
        /* ============================================================
           BLACK & WHITE THEME - Light Mode (Default)
           ============================================================ */
        :root {
            /* Light Mode (Default) */
            --bg: #f2f2f7;
            --bg-secondary: #e5e5ea;
            --card: #ffffff;
            --card-hover: #f0f0f5;
            --text: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-tertiary: #8e8e93;
            --text-quaternary: #aeaeb2;
            --separator: #e5e5ea;
            --separator-heavy: #d1d1d6;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.10);
            --shadow-modal: 0 -8px 40px rgba(0, 0, 0, 0.12);
            --primary: #000000;
            --primary-dark: #000000;
            --primary-surface: #f0f0f0;
            --badge-bg: #000000;
            --badge-text: #ffffff;
            --border: #e5e5ea;
            --toggle-bg: #e5e5ea;
            --toggle-dot: #ffffff;
        }
        
        /* ===== DARK MODE VARIABLES ===== */
        [data-theme="dark"] {
            --bg: #000000;
            --bg-secondary: #1c1c1e;
            --card: #1c1c1e;
            --card-hover: #2c2c2e;
            --text: #f2f2f7;
            --text-secondary: #aeaeb2;
            --text-tertiary: #8e8e93;
            --text-quaternary: #636366;
            --separator: #38383a;
            --separator-heavy: #48484a;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-modal: 0 -8px 40px rgba(0, 0, 0, 0.5);
            --primary: #ffffff;
            --primary-dark: #e5e5ea;
            --primary-surface: #2c2c2e;
            --badge-bg: #ffffff;
            --badge-text: #000000;
            --border: #38383a;
            --toggle-bg: #3a3a3c;
            --toggle-dot: #ffffff;
        }
        
        /* ============================================================
           THEME TOGGLE BUTTON (iOS style - Black & White)
           ============================================================ */
        .theme-toggle-ios {
            position: fixed;
            top: 76px;
            right: 16px;
            z-index: 999;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: var(--shadow);
            color: var(--text);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        .theme-toggle-ios:hover {
            transform: scale(1.08);
            box-shadow: var(--shadow-lg);
        }
        
        .theme-toggle-ios:active {
            transform: scale(0.92);
        }
        
        /* ============================================================
           PLATFORM SWITCHER - Black & White
           ============================================================ */
        .platform-switcher {
            position: fixed;
            bottom: 100px;
            right: 16px;
            z-index: 9999;
        }
        
        .switcher-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: var(--badge-text);
            border: none;
            padding: 12px 18px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            font-family: inherit;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        .switcher-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.25);
        }
        
        .switcher-toggle:active {
            transform: scale(0.95);
        }
        
        .switcher-toggle .switcher-label {
            font-size: 13px;
        }
        
        .switcher-menu {
            position: absolute;
            bottom: calc(100% + 12px);
            right: 0;
            background: var(--card);
            border-radius: 16px;
            padding: 16px 20px 18px;
            box-shadow: var(--shadow-lg);
            min-width: 220px;
            display: none;
            animation: switcherSlideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .switcher-menu.open {
            display: block;
        }
        
        @keyframes switcherSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .switcher-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .switcher-header span {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
        }
        
        .switcher-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            transition: 0.2s;
            border-radius: 50%;
        }
        
        .switcher-close:hover {
            color: var(--primary);
            background: var(--bg-secondary);
        }
        
        .switcher-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .switcher-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-weight: 600;
            font-size: 14px;
        }
        
        .switcher-option:hover {
            background: var(--bg-secondary);
            border-color: var(--border);
        }
        
        .switcher-option:active {
            transform: scale(0.97);
        }
        
        .switcher-option i {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        
        .switcher-option[data-platform="ios"] i {
            color: var(--text);
        }
        
        .switcher-option[data-platform="android"] i {
            color: var(--text);
        }
        
        .switcher-option[data-platform="web"] i {
            color: var(--text);
        }
        
        .switcher-option .switcher-badge {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            padding: 2px 10px;
            border-radius: 9999px;
            margin-left: auto;
        }
        
        .switcher-option.active {
            background: var(--primary-surface);
            border-color: var(--primary);
        }
        
        .switcher-option.active .switcher-badge {
            background: var(--primary);
            color: var(--badge-text);
        }
        
        .switcher-current {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: center;
        }
        
        .switcher-current strong {
            color: var(--text);
        }
        
        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 480px) {
            .platform-switcher {
                bottom: 80px;
                right: 12px;
            }
            .switcher-toggle {
                padding: 10px 14px;
                font-size: 12px;
            }
            .switcher-toggle .switcher-label {
                display: none;
            }
            .switcher-menu {
                min-width: 190px;
                padding: 14px 16px 16px;
                right: 0;
                bottom: calc(100% + 10px);
            }
            .switcher-option {
                padding: 8px 12px;
                font-size: 13px;
            }
            .switcher-option i {
                font-size: 18px;
                width: 24px;
            }
            .switcher-option .switcher-badge {
                font-size: 9px;
                padding: 1px 8px;
            }
            .theme-toggle-ios {
                top: 68px;
                right: 12px;
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }
        
        @media (max-width: 380px) {
            .platform-switcher {
                bottom: 72px;
                right: 8px;
            }
            .switcher-toggle {
                padding: 8px 12px;
                font-size: 11px;
            }
            .switcher-menu {
                min-width: 170px;
                padding: 12px 14px 14px;
            }
            .switcher-option {

                font-size: 12px;
                gap: 8px;
            }
            .switcher-option i {
                font-size: 16px;
                width: 20px;
            }
        }
    </style>

    <!-- ============================================================
         THEME TOGGLE SCRIPT
         ============================================================ -->
    <script>
        (function() {
            // ===== THEME TOGGLE - Black & White =====
            var savedTheme = localStorage.getItem('muiz-theme') || 'light';
            var themeToggle = document.getElementById('themeToggle');
            var themeIcon = document.getElementById('themeIcon');
            var themeColor = document.getElementById('themeColor');
            
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('muiz-theme', theme);
                
                if (theme === 'dark') {
                    themeIcon.className = 'fas fa-sun';
                    themeColor.content = '#000000';
                } else {
                    themeIcon.className = 'fas fa-moon';
                    themeColor.content = '#000000';
                }
            }
            
            // Apply saved theme (default = light)
            applyTheme(savedTheme);
            
            themeToggle.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme') || 'light';
                var next = current === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
    
    <!-- ============================================================
         PLATFORM SWITCHER SCRIPT
         ============================================================ -->
    <script>
        (function() {
            // ===== PLATFORM SWITCHER =====
            var toggleBtn = document.getElementById('switcherToggle');
            var closeBtn = document.getElementById('switcherClose');
            var menu = document.getElementById('switcherMenu');
            var switcher = document.getElementById('platformSwitcher');
            
            function toggleMenu() {
                menu.classList.toggle('open');
            }
            
            function closeMenu() {
                menu.classList.remove('open');
            }
            
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
            });
            
            closeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeMenu();
            });
            
            document.addEventListener('click', function(e) {
                if (switcher && !switcher.contains(e.target)) {
                    closeMenu();
                }
            });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeMenu();
            });
            
            // Current platform label
            var label = document.getElementById('currentPlatformLabel');
            if (label) label.textContent = 'iOS';
        })();
    </script>
