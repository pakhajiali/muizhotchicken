    <style>
        /* ============================================================
           ALL STYLES EMBEDDED - Black & White Theme
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ===== LIGHT MODE (default) ===== */
        :root {
            --bg: #f5f5f5;
            --bg-secondary: #e8e8e8;
            --card: #ffffff;
            --card-elevated: #ffffff;
            --text: #1c1c1e;
            --text-secondary: #3a3a3c;
            --text-tertiary: #8e8e93;
            --text-disabled: #c7c7cc;
            --text-inverse: #ffffff;
            
            --primary: #000000;
            --primary-dark: #000000;
            --primary-light: #3a3a3c;
            --primary-surface: #f0f0f0;
            --primary-gradient: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            
            --separator: #e5e5ea;
            --separator-heavy: #d1d1d6;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-xl: 0 8px 40px rgba(0,0,0,0.16);
            
            --radius: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
            --nav-height: 64px;
            --header-height: 60px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* ===== DARK MODE ===== */
        [data-theme="dark"] {
            --bg: #121212;
            --bg-secondary: #1e1e1e;
            --card: #1e1e1e;
            --card-elevated: #2c2c2e;
            --text: #f2f2f7;
            --text-secondary: #aeaeb2;
            --text-tertiary: #8e8e93;
            --text-disabled: #636366;
            --text-inverse: #1c1c1e;  /* kept for other elements */
            
            --primary: #ffffff;
            --primary-dark: #e5e5ea;
            --primary-light: #f2f2f7;
            --primary-surface: #2c2c2e;
            --primary-gradient: linear-gradient(135deg, #f2f2f7, #aeaeb2);
            
            --separator: #38383a;
            --separator-heavy: #48484a;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-lg: 0 4px 20px rgba(0,0,0,0.5);
            --shadow-xl: 0 8px 40px rgba(0,0,0,0.6);
        }
        
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-top: var(--header-height);
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px);
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-user-select: none;
            user-select: none;
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 20px; }
        ::selection { background: var(--primary); color: var(--text-inverse); }
        
        /* ----- HEADER (fixed for light/dark) ----- */
        .android-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            padding-top: var(--safe-top);
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: var(--transition);
        }
        /* Light mode header */
        .android-header {
            background: #ffffff;
            border-bottom: 1px solid var(--separator);
        }
        .android-header .brand h1,
        .android-header .brand p,
        .android-header .cart-btn {
            color: #1c1c1e;
        }
        .android-header .cart-btn .badge {
            background: #1c1c1e;
            color: #ffffff;
            border-color: #ffffff;
        }
        .android-header .cart-btn:active {
            background: rgba(0,0,0,0.06);
        }
        
        /* Dark mode header */
        [data-theme="dark"] .android-header {
            background: #1c1c1e;
            border-bottom: 1px solid var(--separator);
        }
        [data-theme="dark"] .android-header .brand h1,
        [data-theme="dark"] .android-header .brand p,
        [data-theme="dark"] .android-header .cart-btn {
            color: #ffffff !important;
        }
        [data-theme="dark"] .android-header .cart-btn .badge {
            background: #ffffff;
            color: #1c1c1e;
            border-color: #1c1c1e;
        }
        [data-theme="dark"] .android-header .cart-btn:active {
            background: rgba(255,255,255,0.15);
        }
        
        .header-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }
        
        .brand h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.1;
        }
        .brand p {
            font-size: 12px;
            letter-spacing: -0.2px;
            font-weight: 500;
        }
        .cart-btn {
            position: relative;
            font-size: 22px;
            padding: 6px 8px;
            border: none;
            background: none;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 50%;
        }
        .cart-btn:active { transform: scale(0.92); }
        .cart-btn .badge {
            position: absolute;
            top: 0; right: 0;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            line-height: 1;
            transform: translate(4px, -4px);
            border: 2px solid;
        }
        .cart-btn .badge.show { display: flex; }
        
        /* ----- BOTTOM NAV ----- */
        .android-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--card);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: stretch;
            justify-content: space-around;
            z-index: 999;
            border-top: 1px solid var(--separator);
        }
        .android-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-tertiary);
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            font-family: inherit;
        }
        .android-nav button i { font-size: 22px; transition: var(--transition); }
        .android-nav button span { line-height: 1.2; letter-spacing: -0.2px; }
        .android-nav button.active { color: var(--primary); }
        .android-nav button.active i { transform: scale(1.05); }
        .android-nav button:active { transform: scale(0.94); }
        .android-nav .nav-badge {
            position: absolute;
            top: 2px;
            right: 50%;
            transform: translateX(calc(50% + 14px));
            background: var(--primary);
            color: var(--text-inverse);
            font-size: 9px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            line-height: 1;
        }
        .android-nav .nav-badge.show { display: flex; }
        
        /* ----- CONTENT (all other styles unchanged) ----- */
        .android-content { max-width: 600px; margin: 0 auto; padding: 12px 16px 20px; }
        .page { display: none; animation: fadeUp 0.3s cubic-bezier(0.4,0,0.2,1); }
        .page.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); margin-bottom: 2px; }
        .section-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 14px; }
        
        /* ----- HERO (fixed contrast) ----- */
        .hero {
            background: var(--primary-gradient);
            border-radius: var(--radius);
            padding: 24px 20px 22px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        [data-theme="light"] .hero { color: #ffffff; }
        [data-theme="dark"] .hero { color: #000000; }
        .hero::after { content: "🍗"; position: absolute; right: -8px; bottom: -12px; font-size: 80px; opacity: 0.10; transform: rotate(-8deg); pointer-events: none; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: var(--radius-full);
            font-size: 11px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 10px;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        [data-theme="light"] .hero-badge { background: rgba(255,255,255,0.18); color: #ffffff; }
        [data-theme="dark"] .hero-badge { background: rgba(0,0,0,0.12); color: #000000; }
        .hero h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 4px; }
        [data-theme="light"] .hero h2 { color: #ffffff; }
        [data-theme="dark"] .hero h2 { color: #000000; }
        .hero p { font-size: 14px; opacity: 0.92; max-width: 300px; margin-bottom: 14px; line-height: 1.5; }
        [data-theme="light"] .hero p { color: #ffffff; }
        [data-theme="dark"] .hero p { color: #000000; }
        .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; }
        .hero-actions .btn { padding: 10px 20px; border-radius: var(--radius-full); font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); border: none; cursor: pointer; text-decoration: none; font-family: inherit; }
        .hero-actions .btn:active { transform: scale(0.96); }
        [data-theme="light"] .btn-white { background: #ffffff; color: #1c1c1e; }
        [data-theme="dark"] .btn-white { background: #000000; color: #ffffff; }
        .btn-white:active { opacity: 0.85; }
        [data-theme="light"] .btn-outline-white { background: transparent; color: #ffffff; border: 2px solid rgba(255,255,255,0.3); }
        [data-theme="dark"] .btn-outline-white { background: transparent; color: #000000; border: 2px solid rgba(0,0,0,0.25); }
        .btn-outline-white:active { background: rgba(255,255,255,0.10); }
        [data-theme="dark"] .btn-outline-white:active { background: rgba(0,0,0,0.08); }
        
        /* ----- STATS ----- */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat { background: var(--card); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--separator); }
        .stat i { font-size: 20px; color: var(--primary); display: block; margin-bottom: 2px; }
        .stat strong { display: block; font-size: 16px; font-weight: 700; color: var(--text); }
        .stat small { font-size: 11px; color: var(--text-tertiary); }
        
        /* ----- SCROLL CARDS ----- */
        .scroll-horizontal { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 12px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; margin: 0 -4px; scrollbar-width: none; }
        .scroll-horizontal::-webkit-scrollbar { display: none; }
        .scroll-card { flex: 0 0 150px; scroll-snap-align: start; background: var(--card); border-radius: var(--radius-sm); padding: 12px 10px 14px; box-shadow: var(--shadow-sm); text-align: center; transition: var(--transition); border: 1px solid var(--separator); cursor: pointer; }
        .scroll-card:active { transform: scale(0.96); box-shadow: var(--shadow-md); }
        .scroll-card img { width: 72px; height: 72px; border-radius: var(--radius-sm); object-fit: cover; margin: 0 auto 6px; background: var(--bg-secondary); }
        .scroll-card h4 { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .scroll-card .price { font-size: 14px; font-weight: 700; color: var(--primary); }
        .scroll-card .add-btn { margin-top: 6px; background: var(--primary); color: var(--text-inverse); padding: 4px 14px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .scroll-card .add-btn:active { transform: scale(0.92); }
        
        /* ----- REVIEWS ----- */
        .review-card { flex: 0 0 240px; scroll-snap-align: start; background: var(--card); border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--separator); }
        .review-card .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-gradient); color: var(--text-inverse); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; text-transform: uppercase; margin-bottom: 4px; }
        .review-card .name { font-weight: 700; font-size: 14px; color: var(--text); }
        .review-card .text { font-size: 13px; color: var(--text-secondary); font-style: italic; margin-top: 2px; line-height: 1.4; }
        .review-card .stars { color: #f59e0b; font-size: 12px; margin-top: 4px; }
        
        /* ----- ABOUT ----- */
        .about-snippet { background: var(--card); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); margin-bottom: 16px; border: 1px solid var(--separator); }
        .about-snippet h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .about-snippet h3 span { color: var(--primary); }
        .about-snippet p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 4px; }
        .about-snippet .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .about-snippet .tags span { background: var(--bg-secondary); padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; color: var(--text-secondary); border: 1px solid var(--separator); }
        
        /* ----- MENU ----- */
        .menu-categories { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; -webkit-overflow-scrolling: touch; margin: 0 -4px; scrollbar-width: none; }
        .menu-categories::-webkit-scrollbar { display: none; }
        .menu-categories button { flex: 0 0 auto; padding: 6px 16px; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--card); border: 1px solid var(--separator); box-shadow: var(--shadow-sm); transition: var(--transition); white-space: nowrap; cursor: pointer; font-family: inherit; }
        .menu-categories button.active { background: var(--primary); color: var(--text-inverse); border-color: var(--primary); box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
        .menu-categories button:active { transform: scale(0.94); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
        .menu-item { background: var(--card); border-radius: var(--radius-sm); padding: 12px 12px 14px; box-shadow: var(--shadow-sm); transition: var(--transition); border: 1px solid var(--separator); display: flex; flex-direction: column; cursor: pointer; }
        .menu-item:active { transform: scale(0.97); box-shadow: var(--shadow-md); }
        .menu-item img { width: 100%; aspect-ratio: 1/1; border-radius: var(--radius-sm); object-fit: cover; background: var(--bg-secondary); margin-bottom: 6px; }
        .menu-item h4 { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
        .menu-item .desc { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; flex: 1; line-height: 1.3; }
        .menu-item .bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
        .menu-item .price { font-size: 15px; font-weight: 700; color: var(--primary); }
        .menu-item .add-small { background: var(--primary); color: var(--text-inverse); padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .menu-item .add-small:active { transform: scale(0.92); }
        
        /* ----- CART ----- */
        .cart-empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .cart-empty i { font-size: 48px; color: var(--text-disabled); display: block; margin-bottom: 12px; }
        .cart-empty h3 { font-size: 18px; font-weight: 700; color: var(--text); }
        .cart-empty p { font-size: 14px; }
        .cart-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .cart-item { background: var(--card); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 12px; border: 1px solid var(--separator); }
        .cart-item img { width: 48px; height: 48px; border-radius: var(--radius-sm); object-fit: cover; background: var(--bg-secondary); flex-shrink: 0; }
        .cart-item .info { flex: 1; min-width: 0; }
        .cart-item .info h4 { font-size: 14px; font-weight: 700; color: var(--text); }
        .cart-item .info .price { font-size: 14px; font-weight: 700; color: var(--primary); }
        .cart-item .info .request { font-size: 11px; color: var(--text-tertiary); font-style: italic; margin-top: 1px; }

        .cart-item .controls button.remove { background: none; border: none; color: var(--text-disabled); font-size: 16px; }
        .cart-item .controls button.remove:active { color: var(--primary); }
        .cart-item .controls .qty { font-weight: 700; font-size: 14px; min-width: 20px; text-align: center; color: var(--text); }
        .cart-summary { background: var(--card); border-radius: var(--radius); padding: 16px 18px 18px; box-shadow: var(--shadow-sm); margin-top: 4px; border: 1px solid var(--separator); }

        .cart-summary .row.total { font-size: 18px; font-weight: 700; color: var(--text); border-top: 1px solid var(--separator); padding-top: 10px; margin-top: 4px; }
        .cart-summary .row.total .amount { color: var(--primary); }
        .cart-summary .checkout-btn { width: 100%; padding: 12px; border-radius: var(--radius-full); background: #25D366; color: #fff; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: var(--transition); margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .cart-summary .checkout-btn:active { transform: scale(0.97); background: #1da15a; }
        
        /* ----- ORDERS ----- */
        .order-card { background: var(--card); border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--shadow-sm); margin-bottom: 10px; border-left: 4px solid var(--primary); border: 1px solid var(--separator); border-left-width: 4px; }

    <!-- ============================================================
         THEME TOGGLE SCRIPT
         ============================================================ -->
    <script>
        (function() {
            var saved = localStorage.getItem('muiz-theme') || 'light';
            var toggle = document.getElementById('themeToggle');
            var icon = document.getElementById('themeIcon');
            var color = document.getElementById('themeColor');
            
            function apply(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('muiz-theme', theme);
                if (theme === 'dark') {
                    icon.className = 'fas fa-sun';
                    color.content = '#000000';
                } else {
                    icon.className = 'fas fa-moon';
                    color.content = '#000000';
                }
            }
            apply(saved);
            toggle.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme') || 'light';
                apply(current === 'light' ? 'dark' : 'light');
            });
        })();
    </script>
    
    <!-- ============================================================
         PLATFORM SWITCHER SCRIPT
         ============================================================ -->
    <script>
        (function() {
            var toggleBtn = document.getElementById('switcherToggle');
            var closeBtn = document.getElementById('switcherClose');
            var menu = document.getElementById('switcherMenu');
            var switcher = document.getElementById('platformSwitcher');
            
            function toggleMenu() { menu.classList.toggle('open'); }
            function closeMenu() { menu.classList.remove('open'); }
            
            toggleBtn.addEventListener('click', function(e) { e.stopPropagation(); toggleMenu(); });
            closeBtn.addEventListener('click', function(e) { e.stopPropagation(); closeMenu(); });
            document.addEventListener('click', function(e) {
                if (switcher && !switcher.contains(e.target)) closeMenu();
            });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });
            
            document.getElementById('currentPlatformLabel').textContent = 'Android';
            // Save preferred platform when a switcher link is clicked
document.querySelectorAll('.switcher-option').forEach(function(link) {
    link.addEventListener('click', function(e) {
        var platform = this.dataset.platform;
        if (platform) {
            localStorage.setItem('preferred-platform', platform);
        }
        // The link will navigate normally
    });
});
        })();

        if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
                console.log('✅ Service Worker registered successfully');
            })
            .catch(function(err) {
                console.log('❌ Service Worker registration failed:', err);
            });
    });
        }
    </script>
