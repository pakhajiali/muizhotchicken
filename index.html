    <!-- ===== DEVICE DETECTION & REDIRECT ===== -->
    <script>
        (function() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Detect platform
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isAndroid = /android/i.test(userAgent);
            const isDesktop = !isIOS && !isAndroid;
            
            // Get current path (for subfolder support)
            const path = window.location.pathname;
            const basePath = '/muizhotchicken/';
            const currentPage = window.location.href;
            
            // Check if we're already in a platform folder
            const inIOS = path.includes('/ios/') || currentPage.includes('/ios/');
            const inAndroid = path.includes('/android/') || currentPage.includes('/android/');
            const inWeb = path.includes('/web/') || currentPage.includes('/web/');
            
            // Redirect to appropriate interface
            if (isIOS && !inIOS) {
                window.location.replace(basePath + 'ios/');
                return;
            }
            
            if (isAndroid && !inAndroid) {
                window.location.replace(basePath + 'android/');
                return;
            }
            
            if (isDesktop && !inWeb) {
                window.location.replace(basePath + 'web/');
                return;
            }
            
            // If already in correct folder or detection fails, show fallback
            // This page serves as a fallback/loader
        })();
    </script>
